name: "Task"
description: "리팩토링, 인프라, 개선 작업"
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        ## 작업 요청
        리팩토링, 인프라 변경, 기술 부채 해소, 성능 개선 등에 사용합니다.

  - type: textarea
    id: description
    attributes:
      label: "작업 내용"
      description: "무엇을, 왜 변경하는지 설명해주세요."
      placeholder: "Redis 캐시 TTL이 도메인별로 다르게 설정되어 있어 정책을 통일합니다."
    validations:
      required: true

  - type: textarea
    id: current-state
    attributes:
      label: "현재 상태"
      description: "현재 코드/인프라의 문제점이나 상황을 설명해주세요."
      placeholder: |
        - BrandCacheRepository: TTL 30분
        - ProductCacheRepository: TTL 없음 (무기한)
        - 일관된 정책이 없어 캐시 정합성 이슈 발생 가능
    validations:
      required: true

  - type: textarea
    id: target-state
    attributes:
      label: "목표 상태"
      description: "변경 후 달성하려는 상태를 구체적으로 작성해주세요."
      placeholder: |
        - 전체 도메인 캐시 TTL을 CachePolicy enum으로 통일
        - 도메인별 기본 TTL: 목록 5분, 상세 10분, 코드성 데이터 1시간
    validations:
      required: true

  - type: textarea
    id: affected-scope
    attributes:
      label: "영향 범위"
      description: "변경에 의해 영향받는 모듈, 파일, API를 나열해주세요."
      placeholder: |
        - infrastructure/cache/ 하위 전체
        - BrandCacheRepository, ProductCacheRepository
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: "완료 조건"
      description: "이 작업이 완료되었다고 판단할 수 있는 조건"
      placeholder: |
        - [ ] CachePolicy enum 정의
        - [ ] 기존 캐시 구현체에 적용
        - [ ] 기존 테스트 통과 확인
    validations:
      required: true
